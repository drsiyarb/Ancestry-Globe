name: Build AADR samples stdlib

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-aadr-samples:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build samples.min.json
        run: python scripts/build_aadr_samples.py

      - name: Upload generated dataset
        uses: actions/upload-artifact@v4
        with:
          name: samples.min.json
          path: samples.min.json
